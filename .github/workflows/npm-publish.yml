name: Publish to NPM

on:
  workflow_run:
    workflows: ["Version and Tag"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0)'
        required: true

jobs:
  # ─── Job 1: Extract version and update package.json ───
  prepare:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Resolved version: $VERSION"

    - name: Update package.json version
      run: |
        CURRENT=$(node -p "require('./package.json').version")
        TARGET="${{ steps.version.outputs.version }}"
        echo "Current: $CURRENT -> Target: $TARGET"
        if [ "$CURRENT" != "$TARGET" ]; then
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$TARGET';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to $TARGET"
          git push origin HEAD:main
          echo "Version updated and pushed."
        else
          echo "Version already up to date."
        fi

  # ─── Job 2: Lint (parallel) ───
  lint:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

  # ─── Job 3: Type check (parallel) ───
  type-check:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npm run type-check

  # ─── Job 4: Test (parallel) ───
  test:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

  # ─── Job 5: Build (after all checks pass) ───
  build:
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 1

  # ─── Job 6: Publish to NPM ───
  publish:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Publish to NPM
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Job 7: Summary ───
  summary:
    runs-on: ubuntu-latest
    needs: [prepare, publish]
    if: always()

    steps:
    - name: Publish summary
      if: needs.publish.result == 'success'
      run: |
        echo "## 📦 Published to NPM" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Package: \`nnews-react\`" >> $GITHUB_STEP_SUMMARY
        echo "- Version: \`${{ needs.prepare.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Registry: https://www.npmjs.com/package/nnews-react" >> $GITHUB_STEP_SUMMARY

    - name: Failure summary
      if: needs.publish.result == 'failure'
      run: |
        echo "## ❌ Publish Failed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Version: \`${{ needs.prepare.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Check the job logs for details." >> $GITHUB_STEP_SUMMARY
