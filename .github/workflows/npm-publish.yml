name: Publish to NPM

on:
  workflow_run:
    workflows: ["Version and Tag"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0)'
        required: true

jobs:
  # ─── Job 1: Extract version from git tag or manual input ───
  extract-version:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Extract version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Resolved version: $VERSION"

  # ─── Job 2: Update package.json version and commit ───
  update-version:
    runs-on: ubuntu-latest
    needs: extract-version
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.push.outputs.sha }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Check if version changed
      id: check
      run: |
        CURRENT=$(node -p "require('./package.json').version")
        TARGET="${{ needs.extract-version.outputs.version }}"
        if [ "$CURRENT" = "$TARGET" ]; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
        echo "Current: $CURRENT -> Target: $TARGET"

    - name: Update package.json version
      if: steps.check.outputs.changed == 'true'
      run: npm version ${{ needs.extract-version.outputs.version }} --no-git-tag-version

    - name: Commit and push version update
      id: push
      if: steps.check.outputs.changed == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add package.json package-lock.json
        git commit -m "chore: bump version to ${{ needs.extract-version.outputs.version }}"
        git push origin HEAD:main
        echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: No change needed
      if: steps.check.outputs.changed != 'true'
      id: no-change
      run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  # ─── Job 3: Lint (parallel) ───
  lint:
    runs-on: ubuntu-latest
    needs: update-version

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

  # ─── Job 4: Type check (parallel) ───
  type-check:
    runs-on: ubuntu-latest
    needs: update-version

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npm run type-check

  # ─── Job 5: Test (parallel) ───
  test:
    runs-on: ubuntu-latest
    needs: update-version

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

  # ─── Job 6: Build (after all checks pass) ───
  build:
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 1

  # ─── Job 7: Publish to NPM ───
  publish:
    runs-on: ubuntu-latest
    needs: [extract-version, build]
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Set package version
      run: npm version ${{ needs.extract-version.outputs.version }} --no-git-tag-version

    - name: Publish to NPM
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Job 8: Summary ───
  summary:
    runs-on: ubuntu-latest
    needs: [extract-version, publish]
    if: always()

    steps:
    - name: Publish summary
      if: needs.publish.result == 'success'
      run: |
        echo "## 📦 Published to NPM" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Package: \`nnews-react\`" >> $GITHUB_STEP_SUMMARY
        echo "- Version: \`${{ needs.extract-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Registry: https://www.npmjs.com/package/nnews-react" >> $GITHUB_STEP_SUMMARY

    - name: Failure summary
      if: needs.publish.result == 'failure'
      run: |
        echo "## ❌ Publish Failed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Version: \`${{ needs.extract-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Check the job logs for details." >> $GITHUB_STEP_SUMMARY
